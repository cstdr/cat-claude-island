name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e

          # Get latest release info
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest")

          TAG_NAME=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=$(echo "$TAG_NAME" | sed 's/v//')

          # Find the zip asset
          ASSET_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": "[^"]*\.zip"' \
            | head -1 | sed 's/"browser_download_url": "//;s/"//')

          # Get asset size
          ASSET_SIZE=$(curl -s -I -H "Authorization: token $GITHUB_TOKEN" "$ASSET_URL" \
            | grep -i content-length | awk '{print $2}' | tr -d '\r')

          echo "Tag: $TAG_NAME, Version: $VERSION"
          echo "Asset: $ASSET_URL ($ASSET_SIZE bytes)"

          # Write appcast.xml using printf
          printf '<?xml version="1.0" encoding="UTF-8"?>\n' > appcast.xml
          printf '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n' >> appcast.xml
          printf '  <channel>\n' >> appcast.xml
          printf '    <title>Cat-Claude-Island Updates</title>\n' >> appcast.xml
          printf '    <link>https://cstdr.github.io/cat-claude-island/appcast.xml</link>\n' >> appcast.xml
          printf '    <description>Most recent updates</description>\n' >> appcast.xml
          printf '    <language>en</language>\n' >> appcast.xml
          printf '    <item>\n' >> appcast.xml
          printf '      <title>%s</title>\n' "$TAG_NAME" >> appcast.xml
          printf '      <sparkle:version>%s</sparkle:version>\n' "$VERSION" >> appcast.xml
          printf '      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n' "$TAG_NAME" >> appcast.xml
          printf '      <sparkle:releaseNotesLink>https://%s/releases/tag/%s</sparkle:releaseNotesLink>\n' \
            "$GITHUB_REPOSITORY" "$TAG_NAME" >> appcast.xml
          printf '      <enclosure url="%s"\n' "$ASSET_URL" >> appcast.xml
          printf '               length="%s"\n' "$ASSET_SIZE" >> appcast.xml
          printf '               type="application/octet-stream"/>\n' >> appcast.xml
          printf '    </item>\n' >> appcast.xml
          printf '  </channel>\n' >> appcast.xml
          printf '</rss>\n' >> appcast.xml

          cat appcast.xml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast
          path: appcast.xml
