name: Update Appcast

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-appcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -e

          # Get latest release info
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest")

          TAG_NAME=$(echo "$RESPONSE" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=$(echo "$TAG_NAME" | sed 's/v//')

          # Find the zip asset
          ASSET_URL=$(echo "$RESPONSE" | grep -o '"browser_download_url": "[^"]*\.zip"' \
            | head -1 | sed 's/"browser_download_url": "//;s/"//')

          # Get asset size
          ASSET_SIZE=$(curl -s -I -H "Authorization: token $GITHUB_TOKEN" "$ASSET_URL" \
            | grep -i content-length | awk '{print $2}' | tr -d '\r')

          echo "Tag: $TAG_NAME, Version: $VERSION"
          echo "Asset: $ASSET_URL ($ASSET_SIZE bytes)"

          # Write appcast.xml
          cat > appcast.xml << 'XMLEOF'
<?xml version="1.0" encoding="UTF-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
  <channel>
    <title>Cat-Claude-Island Updates</title>
    <link>https://cstdr.github.io/cat-claude-island/appcast.xml</link>
    <description>Most recent updates</description>
    <language>en</language>
    <item>
      <title>TAG</title>
      <sparkle:version>VER</sparkle:version>
      <sparkle:shortVersionString>TAG</sparkle:shortVersionString>
      <sparkle:releaseNotesLink>https://REPO/releases/tag/TAG</sparkle:releaseNotesLink>
      <enclosure url="URL"
                 length="SIZE"
                 type="application/octet-stream"/>
    </item>
  </channel>
</rss>
XMLEOF

          # Replace placeholders
          sed -i "s/TAG/$TAG_NAME/g" appcast.xml
          sed -i "s/VER/$VERSION/g" appcast.xml
          sed -i "s|URL|$ASSET_URL|g" appcast.xml
          sed -i "s/SIZE/$ASSET_SIZE/g" appcast.xml
          sed -i "s|REPO|$GITHUB_REPOSITORY|g" appcast.xml

          cat appcast.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: appcast.xml

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
